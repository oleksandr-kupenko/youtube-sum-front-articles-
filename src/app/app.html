@if (isAppLoading()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-[var(--color-bg)]">
    <app-loader size="lg" />
  </div>
}

<div class="min-h-screen w-full flex flex-col bg-[var(--color-bg)] text-[var(--color-fg)]">
  <header class="border-b border-[var(--color-border)] px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center justify-between gap-3">
      <a routerLink="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <svg class="w-7 h-7 text-red-500" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        <h1 class="text-lg font-semibold tracking-tight">YouTube Articles</h1>
      </a>

      <div class="flex items-center gap-4">
        <nav>
          <a
            href="https://unwatched.click"
            class="text-sm text-[var(--color-fg)] opacity-60 hover:opacity-100 transition-opacity"
          >Summarize video</a>
        </nav>

        <button
          (click)="themeSvc.cycle()"
          class="p-1.5 rounded-md text-[var(--color-fg-muted)] hover:text-[var(--color-fg)] hover:bg-[var(--color-border)] transition-colors"
          [title]="themeSvc.theme()"
        >
          @switch (themeSvc.theme()) {
            @case ('light') {
              <!-- Sun -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
              </svg>
            }
            @case ('dark') {
              <!-- Moon -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            }
            @default {
              <!-- Monitor (system) -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8M12 17v4"/>
              </svg>
            }
          }
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-12">
    <router-outlet />
  </main>

  <footer class="border-t border-[var(--color-border)] px-6 py-6 mt-auto">
    <div class="max-w-3xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 text-sm text-[var(--color-fg-muted)]">
      <span>&copy; {{ currentYear }} unwatched.click</span>
      <a href="mailto:support@unwatched.click" class="hover:text-[var(--color-fg)] transition-colors">support&#64;unwatched.click</a>
    </div>
  </footer>
</div>
